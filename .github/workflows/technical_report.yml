name: Technical Report Qualys

on:
  # Esecuzione manuale
  workflow_dispatch:

jobs:
  generate-technical-report:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Scarica il codice dal repository
      - name: Checkout codice
        uses: actions/checkout@v4

      # 2. Installa Python 3.9
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. Installa tutte le dipendenze
      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Esegui lo script di generazione Technical Report
      - name: Genera Technical Report Excel
        env:
          SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
          SHAREPOINT_USER: ${{ secrets.SHAREPOINT_USER }}
          SHAREPOINT_PASSWORD: ${{ secrets.SHAREPOINT_PASSWORD }}
        run: |
          echo "Credenziali configurate"
          echo "Esecuzione script technical_report.py..."
          python src/technical_report.py
          
      # 5. Carica l'Excel come artefatto (opzionale)
      - name: Carica Excel come artefatto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Technical-Report-Excel
          path: /tmp/output_technical_report.xlsx
          retention-days: 14
          if-no-files-found: warn
